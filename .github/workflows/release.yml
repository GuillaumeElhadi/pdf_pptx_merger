name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_id:
        description: 'GitHub Release ID to upload assets to'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin --bundles app
            label: macos-arm64
         # - platform: macos-latest
          #  args: --target x86_64-apple-darwin --bundles app
           # label: macos-x86_64
          #- platform: ubuntu-22.04
          #  args: ""
          #  label: linux
          - platform: windows-latest
            args: ""
            label: windows

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          add-job-id-key: false

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Configure @tauri-apps registry
        run: npm config set "@tauri-apps:registry" "https://registry.npmjs.org/" --location=project

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ github.event.release.id || inputs.release_id }}
          args: ${{ matrix.args }}

  update-release-notes:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Append installation instructions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ github.event.release.id || inputs.release_id }}
        run: |
          CURRENT_BODY=$(gh api repos/${{ github.repository }}/releases/$RELEASE_ID --jq '.body')
          NEW_BODY="$CURRENT_BODY

          ---

          ## Installation

          ### Windows
          Télécharge et exécute le fichier \`.msi\` ou \`.exe\`.

          ### macOS (Apple Silicon)
          1. Télécharge et décompresse le fichier \`.tar.gz\`
          2. Déplace \`pdf-merger.app\` dans ton dossier \`Applications\`
          3. Exécute cette commande dans le Terminal pour débloquer l'app :
          \`\`\`bash
          xattr -cr /Applications/pdf-merger.app
          \`\`\`
          4. Lance l'app normalement

          > macOS bloque les applications non signées par défaut. Cette commande supprime l'attribut de quarantaine."

          gh api repos/${{ github.repository }}/releases/$RELEASE_ID \
            -X PATCH \
            -f body="$NEW_BODY"
