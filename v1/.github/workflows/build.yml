name: Build Windows EXE

on:
  release:
    types: [ published ]    # Se declenche quand tu publies une release GitHub
  workflow_dispatch:        # Permet aussi de declencher manuellement

permissions:
  contents: write           # Necessaire pour uploader des assets sur la release

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Recuperer le code ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Installer Python ─────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Telecharger et installer Poppler pour Windows ────────────────────
      - name: Install Poppler
        shell: pwsh
        run: |
          $url = "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.08.0-0/Release-24.08.0-0.zip"
          $zip = "$env:RUNNER_TEMP\poppler.zip"
          $dest = "C:\poppler"

          Write-Host "Telechargement de Poppler..."
          Invoke-WebRequest -Uri $url -OutFile $zip

          Write-Host "Extraction..."
          Expand-Archive -Path $zip -DestinationPath $dest -Force

          $binDir = Get-ChildItem "$dest" -Recurse -Filter "pdftoppm.exe" |
                    Select-Object -First 1 -ExpandProperty DirectoryName

          Write-Host "Poppler bin trouve : $binDir"
          echo "POPPLER_BIN_PATH=$binDir" >> $env:GITHUB_ENV

      # ── 4. Installer les dependances Python ─────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── 5. Patch du .spec avec le bon chemin Poppler ────────────────────────
      - name: Patch POPPLER_BIN_PATH in spec
        shell: pwsh
        run: |
          $spec = Get-Content "pdf_pptx_merger.spec" -Raw
          $spec = $spec -replace 'POPPLER_BIN_PATH = r"[^"]+"', "POPPLER_BIN_PATH = r`"$env:POPPLER_BIN_PATH`""
          Set-Content "pdf_pptx_merger.spec" $spec
          Write-Host "Spec patche avec : $env:POPPLER_BIN_PATH"

      # ── 6. Build PyInstaller ─────────────────────────────────────────────────
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller pdf_pptx_merger.spec

      # ── 7. Verifier que l'exe existe ─────────────────────────────────────────
      - name: Verify build output
        shell: pwsh
        run: |
          $exe = "dist\PDFPPTXMerger.exe"
          if (Test-Path $exe) {
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "EXE produit : $exe ($([math]::Round($size, 1)) MB)"
          } else {
            Write-Error "EXE introuvable"
            exit 1
          }

      # ── 8a. Uploader l'exe sur la release GitHub ────────────────────────────
      #    Uniquement quand le workflow est declenche par une vraie release
      - name: Upload EXE to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist\PDFPPTXMerger.exe

      # ── 8b. Uploader comme artifact en cas de declenchement manuel ───────────
      #    Utile pour tester le build sans creer de release
      - name: Upload artifact (manual run only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: PDFPPTXMerger-windows
          path: dist\PDFPPTXMerger.exe
          retention-days: 7
